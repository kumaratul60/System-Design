<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Multi-Room Socket Chat</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1. Selection Screen -->
    <div id="setup">
        <h2>Choose a Chat Room</h2>
        <select id="room-select">
            <option value="Tech">Tech Talk</option>
            <option value="General">General</option>
            <option value="Design">System Design</option>
        </select>
        <button onclick="joinRoom()">Join Chat</button>
    </div>

    <!-- 2. Chat Screen -->
    <div id="chat-interface">
        <div id="header">
            <strong id="room-title">Room: ...</strong>
            <button onclick="location.reload()" style="background:transparent; color:white; font-size:12px;">Leave</button>
        </div>
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
